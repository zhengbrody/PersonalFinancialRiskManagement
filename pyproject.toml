[tool.black]
line-length = 100
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | __pycache__
  | build
  | dist
  | \.cache
)/
'''

[tool.ruff]
line-length = 100
exclude = [".git", ".venv", "__pycache__", "build", "dist"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle错误
    "F",   # pyflakes
    "I",   # isort
    "W",   # pycodestyle警告
]
# Naming (N-rules) deliberately disabled — this codebase uses uppercase
# locals (CLR_ACCENT, T, FMP_BASE) and uppercase keyword args by design
# (the UI design-token system + financial constants treat these as
# module-level constants). Enforcing snake_case here would force
# 100+ renames purely cosmetic, with no behavioral benefit.
ignore = [
    "E501",  # 行长度由black处理
    "E402",  # streamlit pages frequently configure layout before imports
    "E712",  # `== True`/`== False` show up in pandas mask code clearly
    "E731",  # one-off lambda assignment in legacy module
    "E741",  # `l` is used in legacy code; rename would touch many call sites
    "F841",  # unused locals are common in exploratory code paths
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = ['tests/', 'build/']

[tool.coverage.run]
omit = [
    "pages/*",
    "ui/*",
    "tests/*",
    "app.py",
    "calc_weights.py",
    "market_intelligence.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
]
