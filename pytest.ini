[pytest]
testpaths =
    tests/unit
    tests/integration
python_files = test_*.py
python_functions = test_*
markers =
    performance: network-dependent performance smoke tests, run explicitly
    slow: slower tests that are useful locally but not required in every CI path
    integration: integration tests
addopts =
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=60
    -v
